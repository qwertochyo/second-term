<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/main.css">
  <script src="http://d3js.org/d3.v7.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/table.js"></script>
  <script src="js/chart.js"></script>
  <title>Practice 2.3</title>
</head>

<body>
  <h3>Список самых высоких зданий</h3>
  <form id="chart">
    <p>Значение по оси ОХ</p>
    <input type="radio" name="axisX" value="country">Страна<br>
    <input type="radio" name="axisX" value="year">Год

    <p>Значение по оси ОY</p>
    <div>Выберите ось Y</div>
    <input type="checkbox" id="max" name="axisY" value="max">Максимальная высота<br>
    <input type="checkbox" id="min" name="axisY" value="min">Минимальная высота

    <p>Тип графика
      <select name="chartType" id="chartType">
        <option value="scatter">Точечная диаграмма</option>
        <option value="histogram">Гистограмма</option>
      </select>
    </p>

    <input type="button" value="Построить">
  </form>
  <svg></svg><br>
  <input type="button" value="Скрыть таблицу">
  <table id="build"></table>
</body>

</html>
